<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JB Chess</title>
    <!-- CSS do Chessboard.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 950px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .sidebar {
            width: 320px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 15px 0;
            text-align: center;
            letter-spacing: 2px;
            color: #2c3e50;
            font-weight: 800;
            text-transform: uppercase;
        }
        .panel-row {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-weight: bold;
            color: #555;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select, button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        select {
            background-color: #fafafa;
            cursor: pointer;
        }
        select:disabled {
            background-color: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        #btn-reiniciar {
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #btn-reiniciar:hover { background-color: #219653; }
        
        #btn-inverter {
            background-color: #34495e;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #btn-inverter:hover { background-color: #2c3e50; }
        
        #btn-desistir {
            background-color: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #btn-desistir:hover { background-color: #c0392b; }
        
        #btn-empate {
            background-color: #7f8c8d;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #btn-empate:hover { background-color: #707b7c; }

        .clocks-container {
            width: 400px;
            max-width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 20px;
            box-sizing: border-box;
        }
        .clock {
            padding: 8px 16px;
            border-radius: 6px;
            min-width: 140px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .clock-style-light {
            background: #ffffff;
            color: #333333;
            border: 2px solid #ccc;
        }
        .clock-style-dark {
            background: #2c3e50;
            color: #ffffff;
            border: 2px solid #2c3e50;
        }
        .clock.active-turn {
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.8);
            border-color: #2ecc71 !important;
        }
        
        /* CORREÇÕES PARA MOBILE E DESKTOP DRAG & DROP */
        #board {
            width: 400px;
            max-width: 100%;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 5px 25px rgba(0,0,0,0.25);
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .square-55d63 {
            touch-action: none;
        }
        #board img {
            -webkit-user-drag: none; 
            user-drag: none;
            -webkit-touch-callout: none;
            pointer-events: none; /* Impede o menu do Safari mobile ao segurar a peça */
        }
        
        .highlight-square {
            box-shadow: inset 0 0 4px 4px rgba(241, 196, 15, 0.85) !important;
        }
        .history-title {
            font-weight: bold;
            font-size: 14px;
            color: #555;
            margin-top: 15px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }
        .history-box {
            flex: 1;
            min-height: 120px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .move-number {
            color: #7f8c8d;
            font-weight: bold;
        }
        .move-text {
            color: #2c3e50;
            margin-right: 12px;
            display: inline-block;
            min-width: 45px;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
            .sidebar {
                width: 400px;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="game-area">
        <div class="clocks-container">
            <div id="clock-ia" class="clock">JB CHESS: <span id="tempo-ia">10:00</span></div>
            <div id="clock-jogador" class="clock">Você: <span id="tempo-jogador">10:00</span></div>
        </div>
        <div id="board"></div>
    </div>

    <div class="sidebar">
        <h1>JB Chess</h1>
        <div class="panel-row">
            <label for="dificuldade">Força da IA</label>
            <select id="dificuldade">
                <option value="local">Fácil</option>
                <option value="6" selected>Médio</option>
                <option value="10">Difícil</option>
                <option value="14">Mestre</option>
            </select>
        </div>
        <div class="panel-row">
            <label for="seletor-tempo">Tempo de Partida</label>
            <select id="seletor-tempo">
                <option value="180">3 min (Blitz)</option>
                <option value="300">5 min (Blitz)</option>
                <option value="600" selected>10 min (Rápido)</option>
                <option value="1200">20 min (Rápido)</option>
                <option value="1800">30 min (Clássico)</option>
            </select>
        </div>
        <div class="panel-row">
            <label for="cor-jogador">Jogar de</label>
            <select id="cor-jogador">
                <option value="w" selected>Brancas</option>
                <option value="b">Pretas</option>
            </select>
        </div>
        <div class="btn-group">
            <button id="btn-inverter" title="Girar o Tabuleiro">Girar Visão</button>
            <button id="btn-reiniciar">Novo Jogo</button>
        </div>
        <div class="btn-group">
            <button id="btn-empate">Propor Empate</button>
            <button id="btn-desistir">Desistir</button>
        </div>
        <div class="history-title">Histórico de Lances</div>
        <div id="history" class="history-box"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
    var game = new Chess();
    var board;
    var tempoInicial = 600; 
    var tempoJogador = tempoInicial;
    var tempoIA = tempoInicial;
    var intervaloRelogio = null;
    var jogoAtivo = true;
    var corEscolhida = 'w'; 
    var casaOrigemClicada = null;
    var audioCtx = null;

    var VALORES_PECAS = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };

    var TABELA_PEAO = [
        [0,  0,  0,  0,  0,  0,  0,  0],
        [50, 50, 50, 50, 50, 50, 50, 50],
        [10, 10, 20, 30, 30, 20, 10, 10],
        [5,  5, 10, 25, 25, 10,  5,  5],
        [0,  0,  0, 20, 20,  0,  0,  0],
        [5, -5,-10,  0,  0,-10, -5,  5],
        [5, 10, 10,-20,-20, 10, 10,  5],
        [0,  0,  0,  0,  0,  0,  0,  0]
    ];

    var TABELA_CAVALO = [
        [-50,-40,-30,-30,-30,-30,-40,-50],
        [-40,-20,  0,  0,  0,  0,-20,-40],
        [-30,  0, 10, 15, 15, 10,  0,-30],
        [-30,  5, 15, 20, 20, 15,  5,-30],
        [-30,  0, 15, 20, 20, 15,  0,-30],
        [-30,  5, 10, 15, 15, 10,  5,-30],
        [-40,-20,  0,  5,  5,  0,-20,-40],
        [-50,-40,-30,-30,-30,-30,-40,-50]
    ];

    var TABELA_BISPO = [
        [-20,-10,-10,-10,-10,-10,-10,-20],
        [-10,  0,  0,  0,  0,  0,  0,-10],
        [-10,  0,  5, 10, 10,  5,  0,-10],
        [-10,  5,  5, 10, 10,  5,  5,-10],
        [-10,  0, 10, 10, 10, 10,  0,-10],
        [-10, 10, 10, 10, 10, 10, 10,-10],
        [-10,  5,  0,  0,  0,  0,  5,-10],
        [-20,-10,-10,-10,-10,-10,-10,-20]
    ];

    var TABELA_TORRE = [
        [0,  0,  0,  0,  0,  0,  0,  0],
        [5, 10, 10, 10, 10, 10, 10,  5],
        [-5,  0,  0,  0,  0,  0,  0, -5],
        [-5,  0,  0,  0,  0,  0,  0, -5],
        [-5,  0,  0,  0,  0,  0,  0, -5],
        [-5,  0,  0,  0,  0,  0,  0, -5],
        [-5,  0,  0,  0,  0,  0,  0, -5],
        [0,  0,  0,  5,  5,  0,  0,  0]
    ];

    var TABELA_DAMA = [
        [-20,-10,-10, -5, -5,-10,-10,-20],
        [-10,  0,  0,  0,  0,  0,  0,-10],
        [-10,  0,  5,  5,  5,  5,  0,-10],
        [-5,  0,  5,  5,  5,  5,  0, -5],
        [0,  0,  5,  5,  5,  5,  0, -5],
        [-10,  5,  5,  5,  5,  5,  0,-10],
        [-10,  0,  5,  0,  0,  5,  0,-10],
        [-20,-10,-10, -5, -5,-10,-10,-20]
    ];

    var TABELA_REI = [
        [-30,-40,-40,-50,-50,-40,-40,-30],
        [-30,-40,-40,-50,-50,-40,-40,-30],
        [-30,-40,-40,-50,-50,-40,-40,-30],
        [-30,-40,-40,-50,-50,-40,-40,-30],
        [-20,-30,-30,-40,-40,-30,-30,-20],
        [-10,-20,-20,-20,-20,-20,-20,-10],
        [20, 20,  0,  0,  0,  0, 20, 20],
        [20, 30, 10,  0,  0, 10, 30, 20]
    ];

    function tocarSomPeca() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.08);
        
        gain.gain.setValueAtTime(1.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
    }

    function carregarPecas(piece) {
        return 'https://raw.githubusercontent.com/oakmac/chessboardjs/master/website/img/chesspieces/wikipedia/' + piece + '.png';
    }

    function formatarTempo(segundos) {
        var min = Math.floor(segundos / 60);
        var seg = segundos % 60;
        return (min < 10 ? '0' : '') + min + ':' + (seg < 10 ? '0' : '') + seg;
    }

    function aplicarCoresDosRelogios() {
        $('#clock-jogador').removeClass('clock-style-light clock-style-dark');
        $('#clock-ia').removeClass('clock-style-light clock-style-dark');

        if (corEscolhida === 'w') {
            $('#clock-jogador').addClass('clock-style-light');
            $('#clock-ia').addClass('clock-style-dark');
        } else {
            $('#clock-jogador').addClass('clock-style-dark');
            $('#clock-ia').addClass('clock-style-light');
        }
    }

    function atualizarDestaqueTurno() {
        $('.clock').removeClass('active-turn');
        if (game.game_over() || !jogoAtivo) return;
        if (game.turn() === corEscolhida) $('#clock-jogador').addClass('active-turn');
        else $('#clock-ia').addClass('active-turn');
    }

    function rodarCronometro() {
        if (!jogoAtivo || game.game_over()) return;
        if (game.turn() === corEscolhida) {
            tempoJogador--;
            $('#tempo-jogador').text(formatarTempo(tempoJogador));
            if (tempoJogador <= 0) {
                jogoAtivo = false;
                clearInterval(intervaloRelogio);
                setTimeout(function() { alert("O seu tempo acabou! Vitória do JB CHESS por tempo."); }, 100);
            }
        } else {
            tempoIA--;
            $('#tempo-ia').text(formatarTempo(tempoIA));
            if (tempoIA <= 0) {
                jogoAtivo = false;
                clearInterval(intervaloRelogio);
                setTimeout(function() { alert("O tempo do JB CHESS acabou! Sua vitória por tempo."); }, 100);
            }
        }
        atualizarDestaqueTurno();
    }

    function iniciarRelogio() {
        if (!intervaloRelogio) intervaloRelogio = setInterval(rodarCronometro, 1000);
        atualizarDestaqueTurno();
    }

    function atualizarHistoricoVisual() {
        var moves = game.history();
        var html = '';
        for (var i = 0; i < moves.length; i += 2) {
            var numLance = Math.floor(i / 2) + 1;
            html += '<span class="move-number">' + numLance + '. </span>';
            html += '<span class="move-text">' + moves[i] + '</span>';
            if (moves[i + 1]) html += '<span class="move-text">' + moves[i + 1] + '</span>';
            if (numLance % 2 === 0 && moves[i+1]) html += '<br>';
        }
        var $box = $('#history');
        $box.html(html);
        $box.scrollTop($box[0].scrollHeight); 
    }

    function verificarFimDeJogo() {
        if (game.in_checkmate()) {
            jogoAtivo = false;
            clearInterval(intervaloRelogio);
            setTimeout(function() { alert("Fim de jogo! Xeque-mate."); }, 200);
        } else if (game.in_draw()) {
            jogoAtivo = false;
            clearInterval(intervaloRelogio);
            setTimeout(function() { alert("Fim de jogo! Partida empatada."); }, 200);
        }
    }

    function obterValorPosicional(peca, x, y) {
        var tabela;
        switch(peca.type) {
            case 'p': tabela = TABELA_PEAO; break;
            case 'n': tabela = TABELA_CAVALO; break;
            case 'b': tabela = TABELA_BISPO; break;
            case 'r': tabela = TABELA_TORRE; break;
            case 'q': tabela = TABELA_DAMA; break;
            case 'k': tabela = TABELA_REI; break;
            default: return 0;
        }
        if (peca.color === 'b') {
            return tabela[7 - y][x];
        }
        return tabela[y][x];
    }

    function avaliarTabuleiroCompleto(tabuleiro) {
        var pontuacaoTotal = 0;
        for (var r = 0; r < 8; r++) {
            for (var c = 0; c < 8; c++) {
                var casa = tabuleiro[r][c];
                if (casa) {
                    var valorBase = VALORES_PECAS[casa.type];
                    var valorPosicional = obterValorPosicional(casa, c, r);
                    
                    if (casa.color === 'w') {
                        pontuacaoTotal += (valorBase + valorPosicional);
                    } else {
                        pontuacaoTotal -= (valorBase + valorPosicional);
                    }
                }
            }
        }
        return pontuacaoTotal;
    }

    function minimax(profundidade, isMaximizando, alfa, beta) {
        if (profundidade === 0 || game.game_over()) {
            return avaliarTabuleiroCompleto(game.board());
        }

        var lances = game.moves();
        
        if (isMaximizando) {
            var melhorValor = -Infinity;
            for (var i = 0; i < lances.length; i++) {
                game.move(lances[i]);
                melhorValor = Math.max(melhorValor, minimax(profundidade - 1, false, alfa, beta));
                game.undo();
                alfa = Math.max(alfa, melhorValor);
                if (beta <= alfa) break; 
            }
            return melhorValor;
        } else {
            var melhorValor = Infinity;
            for (var i = 0; i < lances.length; i++) {
                game.move(lances[i]);
                melhorValor = Math.min(melhorValor, minimax(profundidade - 1, true, alfa, beta));
                game.undo();
                beta = Math.min(beta, melhorValor);
                if (beta <= alfa) break; 
            }
            return melhorValor;
        }
    }

    function calcularMelhorLanceLocal() {
        var lancesPossiveis = game.moves({ verbose: true });
        if (lancesPossiveis.length === 0) return null;

        var melhorLance = null;
        var corIA = game.turn(); 
        
        if (corIA === 'w') {
            var melhorPontuacao = -Infinity;
            for (var i = 0; i < lancesPossiveis.length; i++) {
                var lance = lancesPossiveis[i];
                game.move(lance);
                var valorLance = minimax(2, false, -Infinity, Infinity); 
                game.undo();
                
                if (valorLance > melhorPontuacao) {
                    melhorPontuacao = valorLance;
                    melhorLance = lance;
                }
            }
        } else {
            var melhorPontuacao = Infinity;
            for (var i = 0; i < lancesPossiveis.length; i++) {
                var lance = lancesPossiveis[i];
                game.move(lance);
                var valorLance = minimax(2, true, -Infinity, Infinity);
                game.undo();
                
                if (valorLance < melhorPontuacao) {
                    melhorPontuacao = valorLance;
                    melhorLance = lance;
                }
            }
        }

        if (Math.random() < 0.05 && lancesPossiveis.length > 1) {
            var lancesSemOMelhor = lancesPossiveis.filter(function(l) { 
                return l.from !== melhorLance.from || l.to !== melhorLance.to; 
            });
            return lancesSemOMelhor[Math.floor(Math.random() * lancesSemOMelhor.length)];
        }

        return melhorLance;
    }

    function contarPecasNoTabuleiro() {
        var tabuleiro = game.board();
        var total = 0;
        for (var r = 0; r < 8; r++) {
            for (var c = 0; c < 8; c++) {
                if (tabuleiro[r][c] !== null) total++;
            }
        }
        return total;
    }

    function buscarNaTablebaseSyzygy(callbackFallback) {
        var fenAtual = game.fen();
        $.getJSON('https://tablebase.lichess.ovh/standard?fen=' + encodeURIComponent(fenAtual))
        .done(function(data) {
            if (data && data.moves && data.moves.length > 0) {
                var melhorLanceUci = data.moves[0].uci;
                var de = melhorLanceUci.substring(0, 2);
                var para = melhorLanceUci.substring(2, 4);
                var promocao = melhorLanceUci.length > 4 ? melhorLanceUci.substring(4, 5) : 'q';

                game.move({ from: de, to: para, promotion: promocao });
                board.position(game.fen());
                tocarSomPeca();
                atualizarHistoricoVisual();
                verificarFimDeJogo();
                atualizarDestaqueTurno();
            } else {
                callbackFallback();
            }
        })
        .fail(function() {
            callbackFallback();
        });
    }

    function fazerJogadaDaIA() {
        if (!jogoAtivo || game.game_over()) return;
        var profundidade = $('#dificuldade').val(); 
        atualizarDestaqueTurno();

        if (profundidade === 'local') {
            window.setTimeout(function() {
                var totalPecas = contarPecasNoTabuleiro();
                if (totalPecas <= 6 && Math.random() < 0.50) {
                    buscarNaTablebaseSyzygy(fazerFallbackIA);
                } else {
                    fazerFallbackIA();
                }
            }, 350); 
        } else {
            var fenAtual = game.fen();
            $.getJSON('https://stockfish.online/api/s/v2.php?fen=' + encodeURIComponent(fenAtual) + '&depth=' + profundidade)
            .done(function(data) {
                if (data && data.success && data.bestmove) {
                    var melhorLance = data.bestmove.split(' ')[1]; 
                    var de = melhorLance.substring(0, 2);
                    var para = melhorLance.substring(2, 4);
                    var promocaoIA = melhorLance.length > 4 ? melhorLance.substring(4, 5) : 'q';

                    game.move({ from: de, to: para, promotion: promocaoIA });
                    board.position(game.fen());
                    tocarSomPeca();
                    atualizarHistoricoVisual();
                    verificarFimDeJogo();
                    atualizarDestaqueTurno();
                } else {
                    fazerFallbackIA();
                }
            })
            .fail(function() {
                fazerFallbackIA();
            });
        }
    }

    function fazerFallbackIA() {
        var lanceLocal = calcularMelhorLanceLocal();
        if (lanceLocal) {
            game.move(lanceLocal);
            board.position(game.fen());
            tocarSomPeca();
            atualizarHistoricoVisual();
            verificarFimDeJogo();
            atualizarDestaqueTurno();
        }
    }

    function processarMovimentoHumano(origem, destino, isDragDrop) {
        var ehPromocao = false;
        var peao = game.get(origem);
        if (peao && peao.type === 'p') {
            if ((peao.color === 'w' && destino.search(/8/) !== -1) || (peao.color === 'b' && destino.search(/1/) !== -1)) {
                ehPromocao = true;
            }
        }
        var pecaEscolhida = 'q';
        if (ehPromocao) {
            var resposta = prompt("Promoção! Digite a letra da peça:\nD = Dama\nT = Torre\nB = Bispo\nC = Cavalo", "D");
            if (resposta) {
                resposta = resposta.toUpperCase();
                if (resposta === 'D') pecaEscolhida = 'q';
                else if (resposta === 'T') pecaEscolhida = 'r';
                else if (resposta === 'B') pecaEscolhida = 'b';
                else if (resposta === 'C') pecaEscolhida = 'n';
            }
        }

        var move = game.move({ from: origem, to: destino, promotion: pecaEscolhida });
        if (move === null) return false;

        tocarSomPeca();
        atualizarHistoricoVisual();
        verificarFimDeJogo();

        board.position(game.fen());

        if (jogoAtivo) {
            $('#seletor-tempo').prop('disabled', true);
            $('#cor-jogador').prop('disabled', true);
            $('#dificuldade').prop('disabled', true); 
            
            iniciarRelogio();
            window.setTimeout(fazerJogadaDaIA, 250);
        }
        return true;
    }

    function removeHighlight() { $('#board .square-55d63').removeClass('highlight-square'); }
    function addHighlight(square) { $('#board .square-' + square).addClass('highlight-square'); }

    function onDragStart(source, piece, position, orientation) {
        if (!jogoAtivo || game.game_over()) return false;
        if (game.turn() === 'w' && piece.search(/^b/) !== -1) return false;
        if (game.turn() === 'b' && piece.search(/^w/) !== -1) return false;
        if (game.turn() !== corEscolhida) return false;
        
        casaOrigemClicada = null;
        removeHighlight();
    }

    function onDrop(source, target) {
        if (source === target) return 'snapback';
        
        var sucesso = processarMovimentoHumano(source, target, true);
        casaOrigemClicada = null;
        removeHighlight();
        
        if (!sucesso) return 'snapback';
    }

    function onSnapEnd() { board.position(game.fen()); }

    function tratarSelecaoDeCasa(square) {
        if (!jogoAtivo || game.game_over() || game.turn() !== corEscolhida) return;
        var pecaNaCasa = game.get(square);

        if (casaOrigemClicada === null) {
            if (pecaNaCasa && pecaNaCasa.color === corEscolhida) {
                casaOrigemClicada = square;
                removeHighlight();
                addHighlight(square);
            }
        } else {
            if (square === casaOrigemClicada) {
                casaOrigemClicada = null;
                removeHighlight();
            } else {
                var executou = processarMovimentoHumano(casaOrigemClicada, square, false);
                if (executou) {
                    casaOrigemClicada = null;
                    removeHighlight();
                } else {
                    if (pecaNaCasa && pecaNaCasa.color === corEscolhida) {
                        casaOrigemClicada = square;
                        removeHighlight();
                        addHighlight(square);
                    } else {
                        casaOrigemClicada = null;
                        removeHighlight();
                    }
                }
            }
        }
    }

    $(document).ready(function() {
        var touchHandled = false;
        
        $('#board').on('mousedown touchstart', function(e) {
            if (e.type === 'touchstart') touchHandled = true;
            else if (e.type === 'mousedown' && touchHandled) { touchHandled = false; return; }
            if (e.type === 'mousedown' && e.which !== 1) return; 
            
            var target = e.target;
            
            setTimeout(function() {
                var squareEl = $(target).closest('.square-55d63');
                if (squareEl.length) {
                    var square = squareEl.attr('data-square');
                    if (square) tratarSelecaoDeCasa(square);
                }
            }, 10);
        });
    });

    function reiniciarPartida() {
        clearInterval(intervaloRelogio);
        intervaloRelogio = null;
        casaOrigemClicada = null;
        removeHighlight();

        tempoInicial = parseInt($('#seletor-tempo').val());
        tempoJogador = tempoInicial;
        tempoIA = tempoInicial;
        jogoAtivo = true;
        corEscolhida = $('#cor-jogador').val();
        
        $('#tempo-jogador').text(formatarTempo(tempoInicial));
        $('#tempo-ia').text(formatarTempo(tempoInicial));
        
        $('#seletor-tempo').prop('disabled', false);
        $('#cor-jogador').prop('disabled', false);
        $('#dificuldade').prop('disabled', false); 
        $('#btn-empate').prop('disabled', false);
        $('#btn-desistir').prop('disabled', false);
        $('#history').html('');
        
        aplicarCoresDosRelogios();
        game.reset();
        
        if (corEscolhida === 'b') board.orientation('black');
        else board.orientation('white');
        
        board.start();
        atualizarDestaqueTurno();
        
        if (corEscolhida === 'b') {
            iniciarRelogio();
            window.setTimeout(fazerJogadaDaIA, 500);
        }
    }

    function calcularVantagemMaterial() {
        var tabuleiro = game.board();
        var pontosBrancas = 0;
        var pontosPretas = 0;
        var valores = { 'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9, 'k': 0 };

        for (var r = 0; r < 8; r++) {
            for (var c = 0; c < 8; c++) {
                var casa = tabuleiro[r][c];
                if (casa) {
                    if (casa.color === 'w') pontosBrancas += valores[casa.type];
                    else pontosPretas += valores[casa.type];
                }
            }
        }
        var pontosIA = (corEscolhida === 'b') ? pontosBrancas : pontosPretas;
        var pontosJogador = (corEscolhida === 'b') ? pontosPretas : pontosBrancas;
        return pontosIA - pontosJogador; 
    }

    $('#btn-desistir').on('click', function() {
        if (!jogoAtivo || game.game_over()) return;
        if (confirm("Tem certeza que deseja desistir da partida?")) {
            jogoAtivo = false;
            clearInterval(intervaloRelogio);
            $('#btn-empate').prop('disabled', true);
            $('#btn-desistir').prop('disabled', true);
            atualizarDestaqueTurno();
            alert("Você abandonou. Vitória do JB CHESS!");
        }
    });

    $('#btn-empate').on('click', function() {
        if (!jogoAtivo || game.game_over()) return;
        var vantagemIA = calcularVantagemMaterial();
        var profundidade = $('#dificuldade').val();
        var aceitaEmpate = false;

        if (vantagemIA > 1) {
            alert("O JB CHESS recusou a sua proposta de empate. A IA avalia que tem vantagem material suficiente para jogar pela vitória!");
            return;
        } else if (vantagemIA < -1) {
            aceitaEmpate = true;
        } else {
            var numeroAleatorio = Math.random();
            if (profundidade === 'local') { if (numeroAleatorio < 0.70) aceitaEmpate = true; } 
            else if (profundidade === '6') { if (numeroAleatorio < 0.40) aceitaEmpate = true; } 
            else if (profundidade === '10') { if (numeroAleatorio < 0.10) aceitaEmpate = true; }
            else if (profundidade === '14') { if (numeroAleatorio < 0.02) aceitaEmpate = true; }
        }

        if (aceitaEmpate) {
            jogoAtivo = false;
            clearInterval(intervaloRelogio);
            $('#btn-empate').prop('disabled', true);
            $('#btn-desistir').prop('disabled', true);
            atualizarDestaqueTurno();
            alert("O JB CHESS aceitou a sua proposta de empate. Partida empatada por mútuo acordo!");
        } else {
            alert("O JB CHESS recusou a sua proposta de empate. A posição está equilibrada e a IA prefere continuar jogando!");
        }
    });

    $('#btn-inverter').on('click', function() { board.flip(); });
    $('#btn-reiniciar').on('click', reiniciarPartida);
    $('#seletor-tempo').on('change', reiniciarPartida);
    $('#cor-jogador').on('change', reiniciarPartida);

    board = Chessboard('board', {
        draggable: true,
        position: 'start',
        pieceTheme: carregarPecas,
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    });
    reiniciarPartida();
</script>
</body>
</html>
